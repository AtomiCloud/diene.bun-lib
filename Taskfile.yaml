version: '3'
includes:
  secret: tasks/Taskfile.secret.yaml
  unit:
    taskfile: tasks/Taskfile.test.yaml
    vars:
      MODE: unit
      CONFIG: bunfig.unit.toml
  int:
    taskfile: tasks/Taskfile.test.yaml
    vars:
      MODE: int
      CONFIG: bunfig.int.toml
tasks:
  setup:
    desc: Setup the repository
    cmds:
      - ./scripts/local/setup.sh
      - ./scripts/local/secrets.sh
  clean:
    desc: Remove build, dependency, and coverage artifacts
    cmds:
      - rm -rf dist node_modules coverage
  build:
    desc: Build the publishable library (ESM + CJS + types) to dist/
    cmds:
      - ./scripts/local/build.sh
  lint:
    desc: Lints the whole code-base
    cmds:
      - pre-commit run --all-files
  deadcode:
    desc: Review dead-code findings
    cmds:
      - ./scripts/local/deadcode.sh
  test:
    desc: Run unit + integration tests
    cmds:
      - task: unit:default
      - task: int:default
  test:coverage:
    desc: Run unit + integration tests, producing separate coverage artifacts
    cmds:
      - task: unit:coverage
      - task: int:coverage
  test:watch:
    desc: Watch the fast unit suite (aggregate watch entry point)
    cmds:
      - task: unit:watch
