name: ⚡ Reusable Integration Tests
on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false
jobs:
  int:
    name: Integration Tests
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-atomi-nix-store-cache
    steps:
      - uses: AtomiCloud/actions.setup-nix@v3
      - uses: AtomiCloud/actions.cache-bun@v1
      - uses: AtomiCloud/actions.setup-docker@v2
      - name: Run integration tests
        run: nix develop .#ci -c ./scripts/ci/test-int.sh
      - name: Upload integration coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-int
          path: coverage/int
          if-no-files-found: warn
      - name: Upload integration coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: coverage/int/lcov.info
          flags: int
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          disable_search: true
