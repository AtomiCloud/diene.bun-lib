name: CI
on:
  push: null
jobs:
  precommit:
    name: Pre-Commit
    uses: ./.github/workflows/⚡reusable-precommit.yaml
    secrets: inherit
  unit:
    name: Unit Tests
    uses: ./.github/workflows/⚡reusable-test.yaml
    secrets: inherit
    with:
      mode: unit
  int:
    name: Integration Tests
    uses: ./.github/workflows/⚡reusable-test.yaml
    secrets: inherit
    with:
      mode: int
  build:
    name: Build Validation
    uses: ./.github/workflows/⚡reusable-build.yaml
    secrets: inherit
  package-validate:
    name: Package Validation
    uses: ./.github/workflows/⚡reusable-package-validate.yaml
    secrets: inherit
