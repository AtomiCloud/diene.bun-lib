name: ⚡ Reusable Package Validate
on:
  workflow_call:
jobs:
  package-validate:
    name: Package Validation
    permissions:
      contents: read
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-atomi-nix-store-cache
    steps:
      - uses: AtomiCloud/actions.setup-nix@v3
      - uses: AtomiCloud/actions.cache-bun@v1
      - name: Validate package (publint + attw)
        run: nix develop .#ci -c ./scripts/ci/pkg-validate.sh
