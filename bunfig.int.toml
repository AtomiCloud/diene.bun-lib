[test]
root = "tests/integration"
timeout = 120000
coverageReporter = ["text", "lcov"]
coverageDir = "coverage/int"
coverageSkipTestFiles = true
# Integration coverage measures only the src/adapters boundary it exercises.
# Exclude the composition-root entrypoint and pure src/lib units (covered by the unit suite).
coveragePathIgnorePatterns = ["src/index.ts", "src/lib/**"]
